<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DashOrbit - Nutanic Cloud Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="assets/logo.png" alt="DashOrbit Logo" class="logo">
    <h1>DashOrbit - NCM Report Hub</h1>
    <button class="toggle-btn" id="modeToggle">Light Mode</button>
  </header>

  <div class="dropdowns">
    <div class="dropdown">
      <label for="versions">Select Version:</label>
      <select id="versions" name="versions">
        <option value="">--Select--</option>
        <option value="2.0.0">2.0.0</option>
        <option value="1.0.0">1.0.0</option>
      </select>
      <span id="versionError" class="error-message">Please select a version first.</span>
    </div>

    <div class="dropdown">
      <label for="blueprint">Select Blueprint Type:</label>
      <select id="blueprint" name="blueprint" disabled>
        <option value="">--Select--</option>
        <option value="foundation-lite">Foundation-Lite</option>
      </select>
      <span id="typeError" class="error-message">Please select a version before choosing type.</span>
    </div>

    <div class="dropdown">
      <label for="blueprintName">Select Blueprint Name:</label>
      <select id="blueprintName" name="blueprintName" disabled>
        <option value="">--Select--</option>
      </select>
      <span id="nameError" class="error-message">Please select a type before choosing name.</span>
    </div>

    <div class="dropdown">
      <label for="automationType">Automation Type:</label>
      <select id="automationType" name="automationType">
        <option value="">--Select--</option>
        <option value="dsl">DSL Results</option>
        <option value="ui">UI Results</option>
      </select>
    </div>

    <div class="dropdown">
      <label for="iteration">Iteration:</label>
      <select id="iteration" name="iteration">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    </div>

    <div class="dropdown">
      <label for="resultType">Result Type:</label>
      <select id="resultType" name="resultType">
        <option value="">--Select--</option>
        <option value="launch">Launch</option>
        <option value="delete">Delete</option>
      </select>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 DashOrbit</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
