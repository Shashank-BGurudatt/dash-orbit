<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DashOrbit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <img src="assets/logo.png" alt="Logo" class="logo" />
    </div>
    <div class="header-center">
      <h1>DashOrbit - NCM Report Hub</h1>
    </div>
  </header>

  <aside class="sidebar">
    <div class="dropdown">
      <label for="version">Version</label>
      <select id="version">
        <option value="">--Select--</option>
        <option value="1.0.0">1.0.0</option>
        <option value="2.0.0">2.0.0</option>
      </select>
      <div class="error-message">Please select the previous option first.</div>
    </div>

    <div class="dropdown">
      <label for="bp-type">Blueprint Type</label>
      <select id="bp-type" disabled>
        <option value="">--Select--</option>
        <option value="foundation-lite">Foundation-Lite</option>
        <option value="intermediate-pro">Intermediate-Pro</option>
        <option value="comprehensive-enterprise">Comprehensive-Enterprise</option>
      </select>
      <div class="error-message">Select Version first.</div>
    </div>

    <div class="dropdown">
      <label for="bp-name">Blueprint Name</label>
      <select id="bp-name" disabled>
        <option value="">--Select--</option>
        <option value="bp-small">BP-Small</option>
      </select>
      <div class="error-message">Select Blueprint Type first.</div>
    </div>

    <div class="dropdown">
      <label for="automation">Automation Type</label>
      <select id="automation" disabled>
        <option value="">--Select--</option>
        <option value="DSL">DSL</option>
        <option value="UI">UI</option>
      </select>
      <div class="error-message">Select Blueprint Name first.</div>
    </div>

    <!-- Result Type first -->
    <div class="dropdown">
      <label for="result-type">Result Type</label>
      <select id="result-type" disabled>
        <option value="">--Select--</option>
        <option value="Launch">Launch</option>
        <option value="Delete">Delete</option>
      </select>
      <div class="error-message">Select Automation Type first.</div>
    </div>

    <!-- Iteration moved below Result Type -->
    <div class="dropdown">
      <label for="iteration">Iteration</label>
      <select id="iteration" disabled>
        <option value="">--Select--</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
      <div class="error-message">Select Result Type first.</div>
    </div>

    <button class="toggle-btn">Toggle Dark Mode</button>
  </aside>

  <main>
    <div class="content"></div>
  </main>

  <footer>
    <p>© 2026 DashOrbit - Nutanix Cloud Manager Report Hub</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
